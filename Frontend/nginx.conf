server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://internship-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy Swagger UI and OpenAPI docs
    location /swagger-ui/ {
        proxy_pass http://internship-backend:8080/swagger-ui/;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://internship-backend:8080/v3/api-docs;
        proxy_set_header Host $host;
    }

    location /swagger-ui.html {
        proxy_pass http://internship-backend:8080/swagger-ui.html;
        proxy_set_header Host $host;
    }
}